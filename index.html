<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Tower Defense - Mana System</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a12; font-family: sans-serif; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00d2ff; pointer-events: none; font-weight: bold; }
        #mana-container { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 20px; background: #222; border: 2px solid #00d2ff; border-radius: 10px; overflow: hidden;
        }
        #mana-bar { width: 100%; height: 100%; background: #00d2ff; transition: width 0.1s; }
    </style>
</head>
<body>
    <div id="ui">XP: <span id="xp">0</span> | Level: <span id="lvl">1</span></div>
    <div id="mana-container"><div id="mana-bar"></div></div>
    <canvas id="gameCanvas"></canvas>

    <script>
// --- IMAGE LOADING ---
let imagesLoaded = 0;
const totalImages = 3;

function imageLoaded() {
    imagesLoaded++;
}

const bgImg = new Image();
bgImg.onload = imageLoaded;
bgImg.src = 'background.png'; // Make sure this matches your GitHub filename!

const towerImg = new Image();
towerImg.onload = imageLoaded;
towerImg.src = 'tower.png';

const enemyImg = new Image();
enemyImg.onload = imageLoaded;
enemyImg.src = 'monster.png';
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const xpEl = document.getElementById('xp');
        const lvlEl = document.getElementById('lvl');
        const manaBar = document.getElementById('mana-bar');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        let xp = 0;
        let level = 1;
        let magicPath = [];
        let enemies = [];
        
        // Mana Variables
        let mana = 100;
        let maxMana = 100;
        let isDrawing = false;

        // --- CONTROLS ---
        function startDrawing() { isDrawing = true; magicPath = []; }
        function stopDrawing() { isDrawing = false; }

        function handleMove(x, y) {
            if (!isDrawing || mana <= 0) return;
            
            magicPath.push({ x: x, y: y, life: 1.0 });
            checkCollision(x, y);
            mana -= 1.5; // Cost of drawing
            if (mana < 0) mana = 0;
        }

        // Mouse
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        canvas.addEventListener('mouseup', stopDrawing);

        // Touch
        canvas.addEventListener('touchstart', (e) => { startDrawing(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleMove(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});
        canvas.addEventListener('touchend', stopDrawing);

        function checkCollision(tx, ty) {
            enemies.forEach((en, i) => {
                if (Math.hypot(en.x - tx, en.y - ty) < 30) {
                    enemies.splice(i, 1);
                    xp += 10;
                    if(xp % 100 === 0) { level++; lvlEl.innerText = level; }
                    xpEl.innerText = xp;
                }
            });
        }

        function spawnEnemy() {
            if (Math.random() < 0.02 + (level * 0.01)) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.max(canvas.width, canvas.height); 
                enemies.push({ x: centerX + Math.cos(angle) * dist, y: centerY + Math.sin(angle) * dist, speed: 1 + (level * 0.3) });
            }
        }

        function animate() {
    // 1. CLEAR AND DRAW BACKGROUND
    // We check if images are loaded before drawing
    if (imagesLoaded >= totalImages) {
        // This tiles the first square from your background sheet across the screen
        const tileSize = 128; 
        for (let x = 0; x < canvas.width; x += tileSize) {
            for (let y = 0; y < canvas.height; y += tileSize) {
                // Slicing the first tile (top-left) from your background sheet
                ctx.drawImage(bgImg, 0, 0, 250, 250, x, y, tileSize, tileSize);
            }
        }
    } else {
        // Fallback color while loading
        ctx.fillStyle = '#0a0a12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // 2. MANA REGEN
    if (!isDrawing && mana < maxMana) {
        mana += 0.4; 
    }
    manaBar.style.width = (mana / maxMana * 100) + "%";

    // 3. TOWER
    // Drawing the tiered tower from the middle of your sheet
    if (imagesLoaded >= totalImages) {
        ctx.drawImage(towerImg, 350, 50, 300, 500, centerX - 40, centerY - 80, 80, 120);
    }

    // 4. MAGIC PATH
    ctx.strokeStyle = '#00d2ff';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.beginPath();
    magicPath.forEach((p, i) => {
        p.life -= 0.03;
        if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    });
    ctx.stroke();
    magicPath = magicPath.filter(p => p.life > 0);

    // 5. ENEMIES
    enemies.forEach((en, i) => {
        const angle = Math.atan2(centerY - en.y, centerX - en.x);
        en.x += Math.cos(angle) * en.speed;
        en.y += Math.sin(angle) * en.speed;

        if (imagesLoaded >= totalImages) {
            // Slicing the Shambler (first monster)
            ctx.drawImage(enemyImg, 0, 0, 400, 500, en.x - 30, en.y - 30, 60, 60);
        }

        if(Math.hypot(centerX - en.x, centerY - en.y) < 40) {
            enemies.splice(i, 1);
            xp = Math.max(0, xp - 20);
            xpEl.innerText = xp;
        }
    });

    spawnEnemy();
    requestAnimationFrame(animate);
}
    requestAnimationFrame(animate);
}
        animate();
    </script>
</body>
</html>
